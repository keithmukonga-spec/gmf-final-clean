<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Auth | GMF</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700;800&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet"><link rel="stylesheet" href="/static/styles.css"></head><body>
<header class="topbar"><div class="container nav-wrap"><div class="brand">Gig Market Farm</div><nav><a href="/">Home</a><a href="/auth">Auth</a><a href="/jobs">Jobs</a><a href="/marketplace">Marketplace</a><a href="/payments">Payments</a><a href="/blogs-page">Blogs</a><a href="/dashboard">Dashboard</a></nav><button class="btn btn-dark" id="logout-btn">Logout</button></div></header>
<main class="container section"><h2>Authentication & Referrals</h2><div class="grid two"><div class="card"><h3>Register</h3><input id="reg-name" placeholder="Full name"><input id="reg-email" placeholder="Email"><input id="reg-password" type="password" placeholder="Strong password"><p class="muted">Use a strong password: upper + lower + number + symbol.</p><select id="reg-role"><option value="client">Client</option><option value="freelancer">Freelancer</option><option value="seller">Seller</option></select><input id="reg-ref" placeholder="Referral code (optional)"><button class="btn btn-gold" id="register-btn">Register</button></div><div class="card"><h3>Login</h3><input id="login-email" placeholder="Email"><input id="login-password" type="password" placeholder="Password"><input id="login-ref" placeholder="Referral code for login-click bonus"><button class="btn btn-gold" id="login-btn">Login</button><button class="btn btn-cyan" id="ref-summary-btn">Load Referral Summary</button><div id="ref-summary-list" class="cards-list"></div></div></div>
<div class="card" style="margin-top:12px;"><h3>Your Referral Link</h3><button class="btn btn-dark" id="load-ref-link-btn">Generate Referral Link</button><input id="ref-code-output" readonly placeholder="Referral code"><div class="grid two"><input id="ref-link-output" readonly placeholder="Referral link"><button class="btn btn-cyan" id="copy-ref-link-btn">Copy Link</button></div><button class="btn btn-dark" id="copy-ref-code-btn">Copy Code</button></div>
<p id="me-box" class="muted">Not logged in</p><p id="status-box" class="notice">Ready.</p></main>
<script src="/static/app.js"></script></body></html>
