<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Marketplace | GMF</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700;800&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet"><link rel="stylesheet" href="/static/styles.css"></head><body>
<header class="topbar"><div class="container nav-wrap"><div class="brand">Gig Market Farm</div><nav><a href="/">Home</a><a href="/auth">Auth</a><a href="/jobs">Jobs</a><a href="/marketplace">Marketplace</a><a href="/payments">Payments</a><a href="/blogs-page">Blogs</a><a href="/dashboard">Dashboard</a></nav><button class="btn btn-dark" id="logout-btn">Logout</button></div></header>
<main class="container section"><h2>Seller Marketplace</h2><div class="grid two"><div class="card"><h3>Add Product</h3><input id="product-name" placeholder="Product name"><textarea id="product-description" rows="4" placeholder="Description"></textarea><input id="product-price" type="number" placeholder="Price"><input id="product-stock" type="number" placeholder="Stock"><input id="product-image" placeholder="Image URL for gallery"><button class="btn btn-gold" id="create-product-btn">Add Product</button></div><div class="card"><h3>Place Order</h3><input id="order-product-id" type="number" placeholder="Product ID"><input id="order-qty" type="number" value="1" placeholder="Quantity"><button class="btn btn-cyan" id="order-product-btn">Order</button></div></div><div class="card"><h3>Products</h3><button class="btn btn-dark" id="refresh-products-btn">Refresh</button><div id="products-list" class="cards-list"></div></div><p id="status-box" class="notice">Ready.</p></main>
<script src="/static/app.js"></script></body></html>
