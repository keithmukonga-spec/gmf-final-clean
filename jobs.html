<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Jobs | GMF</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700;800&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet"><link rel="stylesheet" href="/static/styles.css"></head><body>
<header class="topbar"><div class="container nav-wrap"><div class="brand">Gig Market Farm</div><nav><a href="/">Home</a><a href="/auth">Auth</a><a href="/jobs">Jobs</a><a href="/marketplace">Marketplace</a><a href="/payments">Payments</a><a href="/blogs-page">Blogs</a><a href="/dashboard">Dashboard</a></nav><button class="btn btn-dark" id="logout-btn">Logout</button></div></header>
<main class="container section"><h2>Freelance Jobs</h2><div class="grid two"><div class="card"><h3>Post Job</h3><input id="job-title" placeholder="Job title"><textarea id="job-description" rows="4" placeholder="Description"></textarea><div class="grid two"><input id="job-budget" type="number" placeholder="Budget amount"><select id="job-currency"><option value="KES">KES</option><option value="USD">USD</option></select></div><button class="btn btn-gold" id="create-job-btn">Post</button></div><div class="card"><h3>Apply Job</h3><input id="apply-job-id" type="number" placeholder="Job ID"><textarea id="apply-note" rows="4" placeholder="Cover note"></textarea><input id="apply-amount" type="number" placeholder="Proposed amount"><button class="btn btn-cyan" id="apply-job-btn">Apply</button></div></div><div class="card"><h3>Available Jobs</h3><button class="btn btn-dark" id="refresh-jobs-btn">Refresh</button><div id="jobs-list" class="cards-list"></div></div><p id="status-box" class="notice">Ready.</p></main>
<script src="/static/app.js"></script></body></html>
